<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="aurora" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38E0C4"/>
      <stop offset="0.52" stop-color="#7C8CFF"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="bubble" x1="262" y1="315" x2="262" y2="672" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EAF0FF"/>
    </linearGradient>
    <!-- Glass tile: aurora bloom in the corners + a specular sheen on the top edge.
         Kept restrained so the deeper field reads like today ("in-between" level). -->
    <radialGradient id="bloomTeal" cx="0.16" cy="0.9" r="0.57">
      <stop offset="0" stop-color="#3FF0D6" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#3FF0D6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bloomViolet" cx="0.9" cy="0.1" r="0.57">
      <stop offset="0" stop-color="#B79CFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#B79CFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheen" x1="512" y1="61" x2="512" y2="963" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="0.19" stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="0.34" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- Aurora transmitting up through the glass bubble + a soft top highlight. -->
    <radialGradient id="transmit" cx="0.5" cy="1.05" r="0.9">
      <stop offset="0" stop-color="#7C8CFF" stop-opacity="0.32"/>
      <stop offset="0.55" stop-color="#59D9C4" stop-opacity="0.134"/>
      <stop offset="1" stop-color="#59D9C4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bubbleHi" x1="512" y1="315" x2="512" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="depth" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#1A1145" flood-opacity="0.25"/>
    </filter>
    <clipPath id="tileClip"><rect x="61" y="61" width="902" height="902" rx="225"/></clipPath>
    <clipPath id="bubbleClip"><rect x="262" y="315" width="500" height="357" rx="132"/><path d="M405 665 L332 808 L548 665 Z"/></clipPath>
  </defs>

  <rect x="61" y="61" width="902" height="902" rx="225" fill="url(#aurora)"/>
  <g clip-path="url(#tileClip)">
    <rect x="61" y="61" width="902" height="902" fill="url(#bloomTeal)"/>
    <rect x="61" y="61" width="902" height="902" fill="url(#bloomViolet)"/>
    <rect x="61" y="61" width="902" height="902" fill="url(#sheen)"/>
  </g>
  <rect x="63.5" y="63.5" width="897" height="897" rx="222.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="3"/>

  <g filter="url(#depth)" fill="url(#bubble)">
    <rect x="262" y="315" width="500" height="357" rx="132"/>
    <path d="M405 665 L332 808 L548 665 Z"/>
  </g>
  <g clip-path="url(#bubbleClip)">
    <rect x="262" y="315" width="500" height="493" fill="url(#transmit)"/>
    <rect x="262" y="315" width="500" height="245" fill="url(#bubbleHi)"/>
  </g>
</svg>
