<!DOCTYPE html>
<!--
  Blog hero for the 0.17.2 release post ("night stage" layout, polish story).
  Render with: node scripts/blog-hero/render.mjs 0.17.2

  Departs from 0.17.0/0.17.1 in one way: there is no second overlapping card.
  Those heroes put a cropped chip of UI on top of an unrelated window, which
  here left three subjects competing and the underlying message text poking out
  around the card as fragments. One window carries the whole story instead.
-->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="shared.css">
<style>
  body { background: #0B1020; }
  .glow-teal { position: absolute; width: 900px; height: 900px; left: -320px; top: -420px;
    background: radial-gradient(circle, rgba(56,224,196,0.22) 0%, rgba(56,224,196,0) 60%); }
  .glow-violet { position: absolute; width: 1100px; height: 1100px; right: -380px; bottom: -520px;
    background: radial-gradient(circle, rgba(167,139,250,0.25) 0%, rgba(167,139,250,0) 62%); }
  .glow-indigo { position: absolute; width: 800px; height: 800px; left: 30%; top: -400px;
    background: radial-gradient(circle, rgba(124,140,255,0.16) 0%, rgba(124,140,255,0) 60%); }

  .left { position: absolute; left: 72px; top: 0; bottom: 0; width: 460px;
    display: flex; flex-direction: column; justify-content: center; gap: 26px; z-index: 3; }
  .lockup svg { width: 320px; height: auto; filter: drop-shadow(0 10px 40px rgba(0,0,0,0.45)); }
  /* Two short lines (0.17.0/0.17.1 ran three longer ones), so the type is set
     well up to keep the same optical weight in the 460px left column. */
  h1 { font-family: 'Inter Tight', sans-serif; font-weight: 700; font-size: 74px; line-height: 1.08;
    color: #F2F4FF; letter-spacing: -0.02em; }
  h1 .grad { background: linear-gradient(100deg, #38E0C4 0%, #7C8CFF 55%, #A78BFA 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent; }
  .version { display: inline-flex; align-items: center; gap: 10px; }
  .version .pill { font-family: 'Inter Tight', sans-serif; font-weight: 600; font-size: 22px; color: #0B1020;
    background: linear-gradient(100deg, #38E0C4, #7C8CFF); border-radius: 999px; padding: 4px 16px; }
  .version .date { font-size: 16px; color: #8A93B8; font-weight: 500; }
  .chips { display: flex; flex-wrap: wrap; gap: 10px; max-width: 430px; }
  .chip { font-size: 15.5px; font-weight: 600; color: #C7CEEC; border: 1px solid rgba(124,140,255,0.35);
    background: rgba(124,140,255,0.08); border-radius: 999px; padding: 7px 15px; }

  /* One object. The window is cropped to the conversation column (source x 288..,
     so the icon rail and the sidebar with its green Join button — the highest
     saturation thing in the frame, and meaningless here — fall outside), and the
     shot is the emoji-autocomplete capture itself, so the feature reads in situ.
     Top edge starts at source y 145, below the image attachment fragment. */
  .stage { position: absolute; left: 520px; top: 70px; z-index: 2; }
  .shot { position: relative; width: 760px; height: 563px; border-radius: 14px; overflow: hidden;
    box-shadow: 0 40px 90px rgba(0,0,0,0.55), 0 0 0 1px rgba(124,140,255,0.25);
    transform: rotate(-1.5deg); }
  .shot img { width: 1101px; position: absolute; left: -248px; top: -125px; }
</style></head>

<div class="frame">

    <h1><span class="grad">Polished</span>,<br>end to end</h1>
    <div class="version"><span class="pill">0.17.2</span><span class="date">July 2026</span></div>
