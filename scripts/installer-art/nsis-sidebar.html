<!DOCTYPE html>
<!--
  NSIS sidebar image — 164×314, full-bleed on the welcome and finish pages.

  The one Windows installer surface with no text over it: MUI keeps its copy
  on the white panel to the right. So this is the only bitmap that gets the
  night stage at full strength, and it is the showcase of the set.

  Same 164 px width and same mark scale as the WiX dialog band, so the MSI and
  the .exe read as the same installer.
-->
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="shared.css" />
    <style>
      html,
      body {
        width: 164px;
        height: 314px;
      }
      .glow-teal {
        position: absolute;
        width: 300px;
        height: 300px;
        left: -130px;
        top: -110px;
        background: radial-gradient(
          circle,
          rgba(56, 224, 196, 0.32) 0%,
          rgba(56, 224, 196, 0) 62%
        );
      }
      .glow-violet {
        position: absolute;
        width: 340px;
        height: 340px;
        right: -160px;
        bottom: -150px;
        background: radial-gradient(
          circle,
          rgba(167, 139, 250, 0.34) 0%,
          rgba(167, 139, 250, 0) 62%
        );
      }
      .glow-indigo {
        position: absolute;
        width: 260px;
        height: 260px;
        left: -60px;
        top: 120px;
        background: radial-gradient(
          circle,
          rgba(124, 140, 255, 0.22) 0%,
          rgba(124, 140, 255, 0) 60%
        );
      }
      .mark {
        position: absolute;
        left: 36px;
        top: 111px;
        width: 92px;
        height: 92px;
      }
      /* Right edge only: the seam against MUI's white panel, matching the one
         the WiX dialog draws at the same place. */
      .seam {
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        width: 2px;
      }
    </style>
  </head>
  <body class="night">
    <div class="frame">
      <div class="glow-teal"></div>
      <div class="glow-indigo"></div>
      <div class="glow-violet"></div>
      <img
        class="mark"
        src="../../apps/fluux/src-tauri/icons/icon-variants/hollow/icon-source.svg"
      />
      <div class="seam hairline vertical"></div>
    </div>
  </body>
</html>
