name: Publish Live Demo to Github Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    # Redundant builds from rapid pushes are safe to cancel.
    concurrency:
      group: pages-build
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Fluux
        run: npm run build

      - name: Setup 404 fallback for GH Page routing
        run: cp apps/fluux/dist/index.html apps/fluux/dist/404.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5
        with:
          path: apps/fluux/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    # Never interrupt an in-flight deployment: cancelling mid-deploy leaves
    # GitHub Pages in a bad state and the next run fails with
    # "Deployment failed, try again later." Queue deploys instead.
    concurrency:
      group: pages-deploy
      cancel-in-progress: false

    environment:
      name: github-pages
      url: ${{ steps.deploy4.outputs.page_url || steps.deploy3.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy1.outputs.page_url }}

    steps:
      # Retry transient "Deployment failed, try again later." with back-off.
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5

      - name: Back off before attempt 2
        if: steps.deploy1.outcome == 'failure'
        run: sleep 20

      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5

      - name: Back off before attempt 3
        if: steps.deploy2.outcome == 'failure'
        run: sleep 40

      - name: Deploy to GitHub Pages (attempt 3)
        id: deploy3
        if: steps.deploy2.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5

      - name: Back off before attempt 4
        if: steps.deploy3.outcome == 'failure'
        run: sleep 60

      - name: Deploy to GitHub Pages (attempt 4)
        id: deploy4
        if: steps.deploy3.outcome == 'failure'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5
