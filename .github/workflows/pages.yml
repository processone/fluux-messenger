name: Publish Live Demo to Github Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    # Redundant builds from rapid pushes are safe to cancel.
    concurrency:
      group: pages-build
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Fluux
        run: npm run build

      - name: Setup 404 fallback for GH Page routing
        run: cp apps/fluux/dist/index.html apps/fluux/dist/404.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/fluux/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    # Never interrupt an in-flight deployment: cancelling mid-deploy leaves
    # GitHub Pages in a bad state and the next run fails with
    # "Deployment failed, try again later." Queue deploys instead.
    concurrency:
      group: pages-deploy
      cancel-in-progress: false

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      # GitHub Pages occasionally fails a deployment with "Deployment failed,
      # try again later." even for isolated, non-concurrent runs. Retry once
      # against the same already-uploaded artifact to absorb that flakiness.
      - name: Retry deploy once on transient Pages failure
        if: failure() && steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
